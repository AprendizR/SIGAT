<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGAT</title>
</head>

<body class="min-h-screen bg-blue-300 flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-xl bg-white p-8 shadow-xl">
        <img src="./src/assets/sigatLogo.jpeg" alt="Logotipo da empresa" class="p-10">

        <h1 class="text-center text-2xl font-bold text-slate-800">Cadastro de novo usuário</h1>
        <p class="p-6 text-center text-slate-500">Informe os dados para criar sua conta</p>

        <form id="cadastro-form">
            <label class="mb-2 mt-4 block text-center text-slate-700">E-mail</label>
            <input type="email" id="email" placeholder="email@dominio.com" required autofocus autocomplete="email"
                class="w-full rounded-md border border-slate-500 p-2">

            <label class="mb-2 mt-4 block text-center text-slate-700">Senha</label>
            <input type="password" id="password" placeholder="******" required minlength="6" autocomplete="new-password"
                class="w-full rounded-md border border-slate-500 p-2">

            <label class="mb-2 mt-4 block text-center text-slate-700">Confirmar senha</label>
            <input type="password" id="confirm-password" placeholder="******" required minlength="6"
                autocomplete="new-password" class="w-full rounded-md border border-slate-500 p-2">

            <button id="cadastrar" type="submit"
                class="mt-4 w-full rounded-md bg-black py-2 text-white hover:bg-blue-700">
                Cadastrar
            </button>

            <p class="text-xs text-center p-4">Ao continuar, voce concorda com nossos <strong>Termos de serviço</strong>
                e <strong>Política de privacidade</strong></p>
        </form>

        <div id="message" class="mt-4 hidden rounded-xl p-2 text-center text-sm"></div>

        <p class="mt-6 text-center text-sm text-slate-700">
            Se já possui uma conta
            <a href="./index.html" class="font-semibold text-blue-600 hover:text-blue-800">Entre aqui</a>
        </p>
    </div>
    </div>

    <script type="module" src="/src/novo.js"></script>
</body>

</html>
